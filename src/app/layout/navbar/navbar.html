<header class="navbar" [class.navbar--scrolled]="isScrolled()">
  <div class="container navbar__inner">

    <!-- Logo -->
    <a href="/" class="navbar__logo" aria-label="FloodWatch SK — domov">
      <img
        src="logo.svg"
        alt="FloodWatch SK logo"
        width="56"
        height="56"
        class="navbar__logo-img"
        loading="eager"
      />
      <span class="navbar__logo-text">FloodWatch <span>SK</span></span>
    </a>

    <!-- Desktop nav links -->
    <nav class="navbar__links" aria-label="Hlavná navigácia">
      @for (link of navLinks; track link.anchor) {
        <a [href]="link.anchor" class="navbar__link">{{ link.label }}</a>
      }
    </nav>

    <!-- Right side actions -->
    <div class="navbar__actions">
      <button
        class="navbar__theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="isDark() ? 'Prepínať na svetlý režim' : 'Prepínať na tmavý režim'"
      >
        @if (isDark()) {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        } @else {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>

      <a href="#contact" class="btn btn--primary">Kontaktuj nás</a>

      <button
        class="navbar__hamburger"
        (click)="toggleMobileMenu()"
        [attr.aria-expanded]="isMobileMenuOpen()"
        aria-label="Otvoriť menu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  @if (isMobileMenuOpen()) {
    <div class="navbar__mobile-menu">
      @for (link of navLinks; track link.anchor) {
        <a [href]="link.anchor" class="navbar__mobile-link" (click)="closeMobileMenu()">{{ link.label }}</a>
      }
      <a href="#contact" class="btn btn--primary" style="margin-top: var(--space-4)" (click)="closeMobileMenu()">Kontaktuj nás</a>
    </div>
  }
</header>
